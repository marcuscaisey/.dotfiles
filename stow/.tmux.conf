# Allow all terminal colours
set-option -g default-terminal "tmux-256color"
# Tell tmux that outside terminal supports true color
set-option -ga terminal-overrides ",$TERM:RGB"

# Allow escape sequence passthrough, needed to use OSC52 for yanking to clipboard
set-option -g allow-passthrough on

# Set clipboard using OSC52
set-option -g set-clipboard on

# Increase scrollback buffer size from 2000 to 50000 lines
set-option -g history-limit 50000

# Use vi keybindings in copy mode
set-window-option -g mode-keys vi
# Start copy mode visual selection with v
bind-key -T copy-mode-vi v send-keys -X begin-selection
# Yank copy mode visual selection with y (strip trailing newline)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "perl -pe 'chomp if eof' | tmux load-buffer -w -"

# Remap <prefix> to C-a
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Toggle synchronize-panes with <prefix> + S
bind-key S setw synchronize-panes

# Start window numbering at 1
set-option -g base-index 1

# Automatically renumber windows on deletion / addition
set-option -g renumber-windows on

# Split panes vertically and horizontally with <prefix> + \ and <prefix> + -
# and open in same directory
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind-key '"'
unbind-key %

# Open new window in same directory
bind-key c new-window -c "#{pane_current_path}"

# Open new window in same directory
# Insert new window at the next window after the current one
bind-key C new-window -c "#{pane_current_path}" -a

# Enable mouse mode
set-option -g mouse on

# Disable auto window renaming by programs
set-option -g allow-rename off

# Automatically rename window to $path:$command
set-option -g status-interval 5
set-option -g automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'
# Reset renamed window name to $path:$command with <prefix> + r
bind-key r set-window-option automatic-rename on

# Resize the pane with <prefix> + H/J/K/L
bind-key -r H resize-pane -L 1
bind-key -r J resize-pane -D 1
bind-key -r K resize-pane -U 1
bind-key -r L resize-pane -R 1

# Switch panes with <prefix> + h/j/k/l
bind-key h select-pane -L
bind-key l select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D

# Swap window left / right with <prefix> + < / >
bind-key -r < swap-window -t -1 -d
bind-key -r > swap-window -t +1 -d

# Switch to last window with <prefix> + a
bind-key a last-window

# Reload tmux.conf with <prefix> + r
bind-key R source-file ~/.tmux.conf

# Wait only for 10ms for escape to be registered
set-option -sg escape-time 10

# Increase message display duration from 750ms to 4s
set-option -g display-time 4000

# Focus events enabled for terminals that support them
set-option -g focus-events on

# Theme
theme_fg="#cdd6f4"
theme_inactive_bg="#1e1e2e"
theme_active_bg="#313244"
theme_message_fg="#89dceb"
theme_time_icon_bg="#f5c2e7"
theme_session_name_icon_bg="#a6e3a1"
theme_window_index_bg="#89b4fa"
theme_current_window_index_bg="#fab387"

set-option -g status "on"
set-option -g status-bg "$theme_inactive_bg"
set-option -g status-justify "left"
set-option -g status-left ""
set-option -g status-right "#{?pane_synchronized,#[fg=red]panes synchronized,} #[fg=$theme_inactive_bg,bg=$theme_session_name_icon_bg]  #[fg=$theme_fg,bg=$theme_active_bg] #{session_name} #[fg=$theme_inactive_bg,bg=$theme_time_icon_bg] 󰃰 #[fg=$theme_fg,bg=$theme_active_bg] %H:%M | %F "
set-option -g status-left-length "100"
set-option -g status-right-length "100"
set-option -g message-style "fg=$theme_message_fg,bg=$theme_active_bg,align=centre"
set-option -g message-command-style "fg=$theme_message_fg,bg=$theme_active_bg,align=centre"
set-option -g pane-border-style "fg=$theme_active_bg"
set-option -g pane-active-border-style "fg=$theme_current_window_index_bg"
set-window-option -g window-status-activity-style "fg=$theme_fg,bg=$theme_inactive_bg,none"
set-window-option -g window-status-separator ""
set-window-option -g window-status-style "fg=$theme_fg,bg=$theme_inactive_bg,none"
set-window-option -g window-status-format "#[fg=$theme_inactive_bg,bg=$theme_window_index_bg] #{window_index} #[fg=$theme_fg,bg=$theme_inactive_bg] #{window_name} "
set-window-option -g window-status-current-format "#[fg=$theme_inactive_bg,bg=$theme_current_window_index_bg] #{window_index} #[fg=$theme_fg,bg=$theme_active_bg] #{window_name} "

# Plugins
set-option -g @plugin 'tmux-plugins/tpm'

set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'

set-option -g @continuum-restore 'on'

run -b '~/.tmux/plugins/tpm/tpm'
